<body>
<div id="map"></div>
<button id="btn-centrar">📍 Bertres y Valle</button>
<div id="joy-zone"><div id="joy-knob"></div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const INICIO   = [-34.6185, -58.4455];
const ZOOM_FIJO = 18;
// Velocidad: metros por segundo simulados
const SPEED_MPS = 4; // ~15 km/h, velocidad de auto en zona urbana

const saved = JSON.parse(localStorage.getItem('car_latlng_g2') || 'null');
let carLat = saved ? saved.lat : INICIO[0];
let carLng = saved ? saved.lng : INICIO[1];

const map = L.map('map', {
  center:[carLat,carLng], zoom:ZOOM_FIJO,
  zoomControl:false, scrollWheelZoom:false, doubleClickZoom:false,
  touchZoom:false, dragging:false, keyboard:false,
  attributionControl:false, boxZoom:false,
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:ZOOM_FIJO, minZoom:ZOOM_FIJO,
}).addTo(map);

const carIcon = L.divIcon({
  className:'',
  html:`<svg class="car-marker" width="44" height="44" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="22" cy="36" rx="10" ry="4" fill="rgba(0,0,0,0.3)"/>
    <rect x="10" y="14" width="24" height="22" rx="5" fill="#E02020"/>
    <rect x="12" y="8"  width="20" height="10" rx="4" fill="#C81010"/>
    <rect x="13" y="17" width="18" height="10" rx="3" fill="#A80000"/>
    <rect x="14" y="10" width="16" height="7"  rx="2" fill="#7ECFFF" opacity="0.85"/>
    <rect x="14" y="28" width="16" height="5"  rx="2" fill="#7ECFFF" opacity="0.6"/>
    <rect x="7"  y="12" width="5"  height="8"  rx="2" fill="#222"/>
    <rect x="32" y="12" width="5"  height="8"  rx="2" fill="#222"/>
    <rect x="7"  y="26" width="5"  height="8"  rx="2" fill="#222"/>
    <rect x="32" y="26" width="5"  height="8"  rx="2" fill="#222"/>
    <rect x="13" y="8"  width="5"  height="2"  rx="1" fill="#FFF4A0"/>
    <rect x="26" y="8"  width="5"  height="2"  rx="1" fill="#FFF4A0"/>
    <rect x="13" y="34" width="5"  height="2"  rx="1" fill="#FF6060"/>
    <rect x="26" y="34" width="5"  height="2"  rx="1" fill="#FF6060"/>
    <polygon points="22,3 26,9 18,9" fill="#FFF" opacity="0.9"/>
  </svg>`,
  iconSize:[44,44], iconAnchor:[22,22],
});
const carMarker = L.marker([carLat,carLng],{icon:carIcon,zIndexOffset:1000}).addTo(map);

// ── Sistema de ruta por calles ───────────────────────────────
// Guardamos una lista de waypoints de la ruta actual
// El auto avanza por esos puntos a velocidad constante
let routePoints = [];   // [{lat,lng}, ...]
let routeIdx    = 0;    // próximo punto a alcanzar
let fetchingRoute = false;
let lastRouteFetch = 0;

// Pedir ruta OSRM desde posición actual hacia un destino proyectado
async function fetchRoute(toLat, toLng) {
  if (fetchingRoute) return;
  fetchingRoute = true;
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${carLng},${carLat};${toLng},${toLat}?overview=full&geometries=geojson&steps=false`;
    const res  = await fetch(url, {signal: AbortSignal.timeout(2000)});
    const data = await res.json();
    if (data.code === 'Ok' && data.routes?.[0]) {
      const coords = data.routes[0].geometry.coordinates;
      // coords = [[lng,lat], ...]
      routePoints = coords.map(c => ({lat:c[1], lng:c[0]}));
      routeIdx = 0;
    }
  } catch(e) {}
  fetchingRoute = false;
}

// Convertir grados lat/lng a metros aproximados
function latLngDistM(a, b) {
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI/180;
  const dLng = (b.lng - a.lng) * Math.PI/180;
  const x = dLng * Math.cos((a.lat+b.lat)/2 * Math.PI/180);
  return R * Math.sqrt(dLat*dLat + x*x);
}

// Avanzar a lo largo de la ruta la distancia dada (metros)
function advanceOnRoute(meters) {
  if (routePoints.length === 0) return;
  let remaining = meters;
  while (remaining > 0 && routeIdx < routePoints.length - 1) {
    const cur  = {lat:carLat, lng:carLng};
    const next = routePoints[routeIdx];
    const dist = latLngDistM(cur, next);
    if (dist <= remaining) {
      carLat = next.lat;
      carLng = next.lng;
      remaining -= dist;
      routeIdx++;
    } else {
      // Interpolar
      const frac = remaining / dist;
      carLat += (next.lat - carLat) * frac;
      carLng += (next.lng - carLng) * frac;
      remaining = 0;
    }
  }
}

// ── Joystick ─────────────────────────────────────────────────
const joyZone = document.getElementById('joy-zone');
const joyKnob = document.getElementById('joy-knob');
const KNOB_R  = 38;
// Intensidad del joystick (0-1)
let joyDx=0, joyDy=0, joyActive=false;
let lastTime=null, rafId=null;

function updateKnob(dx,dy){
  const dist=Math.sqrt(dx*dx+dy*dy);
  const clamp=Math.min(dist,KNOB_R);
  const angle=Math.atan2(dy,dx);
  joyKnob.style.transform=`translate(calc(-50% + ${Math.cos(angle)*clamp}px), calc(-50% + ${Math.sin(angle)*clamp}px))`;
  // Intensidad normalizada
  const intensity = Math.min(dist/KNOB_R, 1);
  joyDx = dist>8 ? (dx/dist)*intensity : 0;
  joyDy = dist>8 ? (dy/dist)*intensity : 0;
}
function resetKnob(){
  joyKnob.style.transform='translate(-50%,-50%)';
  joyDx=0; joyDy=0;
  routePoints=[];
}

// Proyectar destino: 80m en la dirección del joystick
const PROJ_DIST = 80; // metros
function degPerMeter(lat){ return {dlat:1/111320, dlng:1/(111320*Math.cos(lat*Math.PI/180))}; }

function gameLoop(ts){
  if(!joyActive){rafId=null;return;}
  if(lastTime!==null){
    const dt = Math.min(ts-lastTime, 50) / 1000; // segundos
    const intensity = Math.sqrt(joyDx*joyDx+joyDy*joyDy);

    if(intensity > 0.1){
      // Proyectar destino en dirección del joystick
      const now = Date.now();
      if(now - lastRouteFetch > 600 || routePoints.length === 0){
        lastRouteFetch = now;
        const dpm = degPerMeter(carLat);
        const toLat = carLat + (-joyDy) * PROJ_DIST * dpm.dlat;
        const toLng = carLng +  joyDx  * PROJ_DIST * dpm.dlng;
        fetchRoute(toLat, toLng);
      }
      // Avanzar por la ruta
      const meters = SPEED_MPS * intensity * dt;
      advanceOnRoute(meters);
      carMarker.setLatLng([carLat,carLng]);
      map.panTo([carLat,carLng],{animate:false});
    }
  }
  lastTime=ts;
  rafId=requestAnimationFrame(gameLoop);
}

function getCenter(){const r=joyZone.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function startJoy(cx,cy){
  joyActive=true; lastTime=null;
  const c=getCenter(); updateKnob(cx-c.x,cy-c.y);
  if(!rafId) rafId=requestAnimationFrame(gameLoop);
}
function moveJoy(cx,cy){if(!joyActive)return;const c=getCenter();updateKnob(cx-c.x,cy-c.y);}
function stopJoy(){
  joyActive=false; resetKnob(); lastTime=null;
  localStorage.setItem('car_latlng_g2',JSON.stringify({lat:carLat,lng:carLng}));
}

joyZone.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];startJoy(t.clientX,t.clientY);},{passive:false});
joyZone.addEventListener('touchmove', e=>{e.preventDefault();const t=e.touches[0];moveJoy(t.clientX,t.clientY); },{passive:false});
joyZone.addEventListener('touchend',  e=>{e.preventDefault();stopJoy();},{passive:false});
joyZone.addEventListener('touchcancel',e=>{e.preventDefault();stopJoy();},{passive:false});
joyZone.addEventListener('mousedown', e=>startJoy(e.clientX,e.clientY));
window.addEventListener('mousemove',  e=>moveJoy(e.clientX,e.clientY));
window.addEventListener('mouseup',    ()=>{if(joyActive)stopJoy();});

document.getElementById('btn-centrar').addEventListener('click',()=>{
  carLat=INICIO[0]; carLng=INICIO[1];
  routePoints=[]; routeIdx=0;
  carMarker.setLatLng([carLat,carLng]);
  map.panTo([carLat,carLng],{animate:true,duration:0.3});
  localStorage.setItem('car_latlng_g2',JSON.stringify({lat:carLat,lng:carLng}));
});
</script>
